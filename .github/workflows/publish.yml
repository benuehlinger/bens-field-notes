name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.37"

      - name: Render site
        run: quarto render
        env:
          # Injected by Cloudflare Pages environment variables
          # Set R2_BASE_URL in Cloudflare Pages dashboard → Settings → Environment Variables
          QUARTO_PROFILE: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bens-field-notes
          directory: _site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
