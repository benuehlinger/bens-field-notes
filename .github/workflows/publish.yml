name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, 001-site-v1]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.37"

      - name: Install notebook Python dependencies
        run: python3 -m pip install --quiet -r requirements-notebooks.txt

      - name: Render site
        run: |
          if [ -n "${R2_BASE_URL:-}" ]; then
            quarto render -P "r2-base-url:${R2_BASE_URL}"
          else
            quarto render
          fi
        env:
          # Optional — add as a GitHub Actions secret if you use this workflow
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bens-field-notes
          directory: _site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Email — new data notification
        if: success() && startsWith(github.event.head_commit.message, 'data:')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Ben's Field Notes — New Data Live"
          to: benuehlinger@gmail.com
          from: "Ben's Field Notes <${{ secrets.GMAIL_USERNAME }}>"
          body: |
            New dashboard data is live at https://bensnotes.fyi

            Dataset: ${{ github.event.inputs.dataset || 'auto' }}
            Commit: ${{ github.event.head_commit.message }}
