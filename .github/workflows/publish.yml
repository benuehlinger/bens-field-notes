name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.9.37"

      - name: Render site
        run: |
          if [ -n "${R2_BASE_URL:-}" ]; then
            quarto render -P "r2-base-url:${R2_BASE_URL}"
          else
            quarto render
          fi
        env:
          # Optional — add as a GitHub Actions secret if you use this workflow
          R2_BASE_URL: ${{ secrets.R2_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bens-field-notes
          directory: _site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
